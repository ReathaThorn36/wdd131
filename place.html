<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover the beauty, culture, and weather of Cambodia.">
  <meta name="author" content="Reatha Thorn">
  <title>Discover Cambodia</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/place.css">
  <script src="scripts/place.js" defer></script>
</head>
<body>
  <header>
    <h1>Discover Cambodia</h1>
  </header>

  <main>
    <section class="hero">
      <h2 class="visually-hidden">Hero Image</h2>
      <picture>
        <source srcset="images/hero-small.webp" media="(max-width: 600px)">
        <img src="images/hero-large.webp" alt="Angkor Wat Temple in Cambodia">
      </picture>
    </section>

    <section class="data">
      <h2>Weather <span class="icon" aria-hidden="true"></span></h2>
      <p><img src="images/weather-icon.svg" alt="Weather icon" class="mobile-icon"></p>
      <p>Temperature: <span id="temp">5</span>°C</p>
      <p>Wind Speed: <span id="speed">15</span> km/h</p>
      <p>Wind Chill: <span id="windchill">Calculating...</span></p>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> | Reatha Thorn</p>
    <p>Last Modified: <span id="lastModified"></span></p>
  </footer>
</body>
</html>
